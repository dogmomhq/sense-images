<!DOCTYPE html>

<meta charset="utf-8">
<title>Sense Game — Animal Images</title>
<style>
body { font-family: -apple-system, sans-serif; background: #111; color: #fff; padding: 40px 20px; margin: 0; }
h1 { text-align: center; margin-bottom: 30px; font-size: 2em; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; max-width: 1400px; margin: 0 auto; }
.card { background: #1a1a1a; border-radius: 12px; overflow: hidden; transition: transform 0.2s; }
.card:hover { transform: scale(1.03); }
.card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
.card p { text-align: center; padding: 12px; margin: 0; font-weight: 600; font-size: 1.1em; }
</style>
</head>
